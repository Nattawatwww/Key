<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Free Key</title>
    <style>
        body { background: #0b0f1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #171c29; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .key-display { font-size: 28px; color: #6366f1; margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; border: 1px dashed #6366f1; }
        .error { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="main-box">
    <h2>Checking Status...</h2>
</div>

<script>
    const DB_URL = "https://jood-af2d8-default-rtdb.asia-southeast1.firebasedatabase.app";
    const DB_SECRET = "JXRzMTiI2hQo9rps823i8guY5y14fxWPUeFDO5oU";

    async function checkAndGen() {
        const ref = document.referrer;
        const box = document.getElementById('main-box');

        // ตรวจสอบว่ามาจาก Linkvertise หรือไม่
        if (ref.includes("linkvertise.com")) {
            const key = "FREE-" + Math.random().toString(36).substring(2, 8).toUpperCase();
            const now = Math.floor(Date.now() / 1000);
            const data = {
                expiry: now + 43200,
                hwid: "",
                status: "waiting",
                created_at: now
            };

            await fetch(`${DB_URL}/keys/${key}.json?auth=${DB_SECRET}`, {
                method: 'PUT',
                body: JSON.stringify(data)
            });

            box.innerHTML = `
                <h2>Your Free Key</h2>
                <div class="key-display">${key}</div>
                <p>Valid for 12 hours. Use within 1 hour!</p>
            `;
        } else {
            box.innerHTML = `
                <h2 class="error">Access Denied</h2>
                <p>Please complete the linkvertise tasks first.</p>
                <button onclick="location.href='https://linkvertise.com/your-link-here'" style="padding:10px 20px; border-radius:10px; border:none; background:#6366f1; color:white; cursor:pointer;">Go to Linkvertise</button>
            `;
        }
    }

    checkAndGen();
</script>

</body>
</html>
