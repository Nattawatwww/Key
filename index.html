<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jood Key Manager</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #1e293b; text-align: center; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: #64748b; }
        input, select { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .result { margin-top: 1.5rem; padding: 1rem; background: #f1f5f9; border-radius: 0.5rem; display: none; word-break: break-all; }
        .key-text { color: var(--primary); font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>Jood Key Generator</h2>
    <label>Admin Password</label>
    <input type="password" id="adminPass" placeholder="รหัสเจ้าของ">
    
    <label>อายุการใช้งาน</label>
    <select id="duration">
        <option value="7">7 วัน (Weekly)</option>
        <option value="30">1 เดือน (Monthly)</option>
    </select>

    <button onclick="generateKey()">สร้าง Key ใหม่</button>

    <div id="resultBox" class="result">
        <label>สร้างสำเร็จ! ก๊อปปี้ด้านล่างนี้:</label>
        <div id="keyDisplay" class="key-text"></div>
        <small id="expiryDisplay" style="color: #94a3b8;"></small>
    </div>
</div>

<script>
    // ตั้งรหัสผ่านเจ้าของตรงนี้
    const OWNER_SECRET = "JOOD2026"; 

    function generateKey() {
        const pass = document.getElementById('adminPass').value;
        if (pass !== OWNER_SECRET) {
            alert("รหัสผ่านไม่ถูกต้อง!");
            return;
        }

        const days = parseInt(document.getElementById('duration').value);
        const randomStr = Math.random().toString(36).substring(2, 12).toUpperCase();
        const key = "JOOD-" + randomStr;
        
        // คำนวณเวลาหมดอายุ (Timestamp)
        const now = new Date();
        const expiryDate = new Date(now.getTime() + (days * 24 * 60 * 60 * 1000));
        
        // แสดงผล
        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('keyDisplay').innerText = key;
        document.getElementById('expiryDisplay').innerText = "หมดอายุวันที่: " + expiryDate.toLocaleString();

        // หมายเหตุ: ในขั้นตอนนี้คุณต้องส่งค่า 'key' และ 'expiryDate.getTime()' ไปเก็บใน Database ของคุณ
        console.log("บันทึกข้อมูล:", { key: key, expires: expiryDate.getTime() });
        alert("สร้าง Key แล้ว! (อย่าลืมนำไปเพิ่มในระบบ Database ของคุณ)");
    }
</script>

</body>
</html>
